# Marketing site — https://www.specboard.ai (+ apex specboard.ai).
# Fly app "specboard-www", org "specboard". Deploy from the repo root:
#   fly deploy -c fly.marketing.toml
# Separate from the app (app.specboard.ai = fly app "specboard").
app = "specboard-www"
primary_region = "sjc"

[build]
  dockerfile = "infra/marketing.Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep one warm so the public landing page never cold-starts on first visit.
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
