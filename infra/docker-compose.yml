# Self-host stack: Specboards web + Postgres. The hosted SaaS runs the same
# image on Fly.io Machines + Fly Postgres; auth (Better Auth) runs
# in-app against Postgres in both shapes. Migrations: infra/migrations/.
#
# Secrets: compose reads infra/.env automatically (see infra/.env.example).
# The postgres/postgres default below is for local development and trials
# only. For any host other machines can reach, set a strong
# POSTGRES_PASSWORD in infra/.env BEFORE the first `up`: Postgres bakes the
# password into the data volume on initialization, so changing it later
# means `ALTER USER` in psql, not just editing the env file.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: specboard
    ports:
      # Loopback only: host-side tools (psql, pnpm db:migrate) can connect,
      # other machines cannot. Remove the mapping if you don't need host
      # access; the web service reaches db over the compose network either
      # way. Do not publish 5432 on all interfaces.
      - "127.0.0.1:5432:5432"
    volumes:
      - specboard_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/specboard
      # Public origin used for OAuth callbacks, webhook URLs, and discovery
      # metadata. The localhost default suits a local trial; when serving
      # beyond this machine, set APP_URL in infra/.env to the real HTTPS
      # origin. Without it the app falls back to request headers, which a
      # misconfigured proxy can spoof.
      APP_URL: ${APP_URL:-http://localhost:3000}
      # Single-workspace self-host: auth/SSO are commercial add-ons.
      SPECBOARDS_SELF_HOST: "true"
      # Set to "true" to reject sign-ups from consumer email providers
      # (gmail.com, outlook.com, ...). Off by default for self-host.
      SPECBOARDS_BLOCK_PUBLIC_EMAIL_DOMAINS: "false"
      # Optional outbound email (verification / password reset) via Postmark.
      # Unset = emails are skipped with a logged warning.
      # POSTMARK_SERVER_TOKEN: ""
      # EMAIL_FROM: "Specboards <no-reply@example.com>"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  specboard_db:
