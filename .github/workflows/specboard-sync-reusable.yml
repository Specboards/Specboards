# DEPRECATED back-compat shim (Specboard -> Specboards rebrand).
#
# The reusable sync workflow moved to `specboards-sync-reusable.yml` and its
# secret inputs were renamed SPECBOARD_* -> SPECBOARDS_*. This shim keeps existing
# callers working unchanged: it lives at the old path and still accepts the old
# secret names, forwarding to the new workflow. It will be removed in a future
# release, so migrate your caller:
#
#   uses: Specboards/Specboards/.github/workflows/specboards-sync-reusable.yml@main
#   secrets:
#     SPECBOARDS_URL: ${{ secrets.SPECBOARDS_URL }}
#     SPECBOARDS_TOKEN: ${{ secrets.SPECBOARDS_TOKEN }}
name: Specboards Sync (reusable, deprecated shim)

on:
  workflow_call:
    inputs:
      cli_version:
        description: "Version of @specboards/cli to run (npm dist-tag or version)."
        type: string
        default: "latest"
    secrets:
      SPECBOARD_URL:
        required: true
      SPECBOARD_TOKEN:
        required: true

jobs:
  sync:
    uses: ./.github/workflows/specboards-sync-reusable.yml
    with:
      cli_version: ${{ inputs.cli_version }}
    secrets:
      SPECBOARDS_URL: ${{ secrets.SPECBOARD_URL }}
      SPECBOARDS_TOKEN: ${{ secrets.SPECBOARD_TOKEN }}
