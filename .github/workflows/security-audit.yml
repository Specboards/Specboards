# Scheduled dependency audit. CI (ci.yml) already fails a PR on a high/critical
# production advisory; this job runs the full audit on a cadence so a newly
# disclosed advisory against an already-merged dependency is caught between PRs,
# and so lower-severity drift stays visible. The high/critical gate here fails
# the run (opening a visible red check); the informational full audit never
# fails the job.
name: Security audit

on:
  schedule:
    # 15:00 UTC every Monday.
    - cron: "0 15 * * 1"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Blocking gate: identical to CI, honors the recorded GHSA exceptions.
      - run: pnpm run audit

      # Informational: the complete advisory list (all severities, including the
      # recorded exceptions) for review. Never fails the run.
      - name: Full advisory report (informational)
        if: always()
        run: pnpm audit --prod --ignore-registry-errors || true
