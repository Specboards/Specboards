# Continuous integration: typecheck, unit tests, and the Playwright E2E suite on
# every PR (and on main). This is the green-before-merge gate the project relied
# on running by hand until now.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: specboard_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Consumed by the migrate step and the E2E run (both the test runner and
      # the app server it spawns). Points at the Postgres service above.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/specboard_e2e
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Build packages + web once; typecheck and E2E both need the output.
      - run: pnpm -w build
      - run: pnpm -w typecheck
      - run: pnpm -w test

      # E2E: apply migrations, install the browser, run the onboarding suite
      # (SPECBOARDS_E2E seams let it run hermetically with a faked GitHub).
      - run: pnpm --filter @specboards/db migrate

      # Two-tenant RLS isolation suite: connects as a non-owner role and
      # proves tenant data cannot cross the workspace boundary (fails closed).
      - run: pnpm --filter @specboards/web test:int

      - run: pnpm --filter @specboards/web exec playwright install --with-deps chromium
      - run: pnpm --filter @specboards/web test:e2e
