# Continuous integration: typecheck, unit tests, and the Playwright E2E suite on
# every PR (and on main). This is the green-before-merge gate the project relied
# on running by hand until now.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: specboard_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Consumed by the migrate step and the E2E run (both the test runner and
      # the app server it spawns). Points at the Postgres service above.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/specboard_e2e
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Fail the build on a high/critical advisory in production dependencies.
      # Accepted exceptions are recorded by GHSA id in package.json
      # (pnpm.auditConfig.ignoreGhsas) and documented, with a review-by date, in
      # docs/security-audit-exceptions.md. A scheduled full audit
      # (security-audit.yml) surfaces lower-severity drift out of band.
      - run: pnpm run audit

      # Build packages + web once; typecheck and E2E both need the output.
      - run: pnpm -w build
      - run: pnpm -w typecheck
      # Lint gate: ESLint flat config with eslint-plugin-jsx-a11y guards the
      # WCAG 2.2 AA work against regressions. Fails the build on any error.
      - run: pnpm -w lint
      - run: pnpm -w test

      # E2E: apply migrations, install the browser, run the onboarding suite
      # (SPECBOARDS_E2E seams let it run hermetically with a faked GitHub).
      - run: pnpm --filter @specboards/db migrate

      # Two-tenant RLS isolation suite: connects as a non-owner role and
      # proves tenant data cannot cross the workspace boundary (fails closed).
      - run: pnpm --filter @specboards/web test:int

      - run: pnpm --filter @specboards/web exec playwright install --with-deps chromium
      - run: pnpm --filter @specboards/web test:e2e
