# Dogfooding loop: keep Specboards work items in sync with this repo's PRs.
#   - PR opened / updated  -> touched specs go in_progress and the PR is linked
#   - PR merged            -> touched specs go done
# "Touched specs" = changed specs/**/spec.md, plus any `Spec: <id>` trailer in
# the PR body (for code-only PRs). Needs repo secrets SPECBOARDS_URL and
# SPECBOARDS_TOKEN (an API key for a dedicated bot user); without them it no-ops.
#
# This is the monorepo-native version (builds the CLI from source). Once
# @specboards/cli is published to npm, switch this to a thin caller of
# .github/workflows/specboards-sync-reusable.yml (which runs the published CLI
# via npx), to dogfood the same reusable workflow customers use.
name: Specboards Sync

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

# Latest event per PR wins; cancel a superseded run.
concurrency:
  group: specboards-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @specboards/cli build
      - name: Sync work items from the PR
        env:
          SPECBOARDS_URL: ${{ secrets.SPECBOARDS_URL }}
          SPECBOARDS_TOKEN: ${{ secrets.SPECBOARDS_TOKEN }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ACTION: ${{ github.event.action }}
          MERGED: ${{ github.event.pull_request.merged }}
        run: bash scripts/specboards/sync-pr.sh
